<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siemens Technical Academy | CBT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-container">
        <div class="logo-header"><span class="siemens-text">SIEMENS</span></div>

        <div id="login-section" class="login-card">
            <h2>Student Login</h2>
            <div class="input-group">
                <label>Student Name</label>
                <input type="text" id="studentName" placeholder="Enter Name">
            </div>
            <div class="input-group">
                <label>TC Number</label>
                <input type="password" id="studentPass" placeholder="Enter Password">
                <p id="login-error" style="display:none; color:red;">❌ Invalid Login Credentials</p>
            </div>
            <button class="login-btn" onclick="showInstructions()">LOG IN</button>
        </div>

        <div id="instruction-section" class="login-card" style="display: none;">
            <h2>Exam Instructions</h2>
            <ul style="text-align: left; line-height: 2;">
                <li>✅ Duration: 30 Minutes</li>
                <li>✅ Security: Do not switch tabs.</li>
            </ul>
            <button class="login-btn" onclick="startExam()">START EXAM</button>
        </div>

        <div id="question-section" class="login-card" style="display: none; max-width: 700px;">
            <div style="display: flex; justify-content: space-between; color: #00828c; font-weight: bold;">
                <span>Question <span id="question-number">1</span></span>
                <span id="timer-display">Time: 30:00</span>
            </div>
            <h3 id="question-text" style="margin-top:20px;"></h3>
            <div id="options-container" style="text-align: left; display: flex; flex-direction: column; gap: 10px;"></div>
            <div style="margin-top: 30px; display: flex; justify-content: space-between;">
                <button id="prev-btn" class="login-btn" style="background:#6c757d" onclick="prevQuestion()">PREVIOUS</button>
                <button id="next-btn" class="login-btn" onclick="nextQuestion()">NEXT</button>
            </div>
        </div>

        <div id="result-section" class="login-card" style="display: none;">
            <h2>Result</h2>
            <div style="font-size: 40px; font-weight: bold;"><span id="final-score">0</span> / <span id="total-q">0</span></div>
            <p id="result-percent">Percentage: 0%</p>
            <button class="login-btn" onclick="location.reload()">CLOSE</button>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
